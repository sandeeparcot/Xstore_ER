<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XStore POS 24.0.0 — ER + Anonymisation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090e;--b1:#1a2535;--b2:#223044;
  --txt:#b8cce0;--dim:#3d5870;--mut:#162030;
  --acc:#00caff;--del:#ff3d60;--upd:#ff8c00;--col:#ff6200;
}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);color:var(--txt);font-family:monospace;font-size:12px;user-select:none}

/* ── Header ── */
#hdr{position:fixed;top:0;left:0;right:0;height:48px;z-index:400;
  background:rgba(7,9,14,.98);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;gap:10px;padding:0 14px}
#logo{font-size:19px;font-weight:900;color:var(--acc);letter-spacing:3px;flex-shrink:0}
.bge{background:var(--b1);border:1px solid var(--b2);color:var(--dim);padding:1px 7px;border-radius:20px;font-size:8px;flex-shrink:0}
.bge.w{background:rgba(255,61,96,.08);border-color:rgba(255,61,96,.25);color:#ff8090}
.sn{font-size:15px;font-weight:700;line-height:1}
.sl{font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.sd{width:1px;height:22px;background:var(--b2);margin:0 2px;flex-shrink:0}

/* ── Toolbar ── */
#tb{position:fixed;top:48px;left:0;right:190px;height:44px;z-index:400;
  background:rgba(7,9,14,.97);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;gap:5px;padding:0 10px;overflow-x:auto}
#tb::-webkit-scrollbar{height:2px}#tb::-webkit-scrollbar-thumb{background:var(--b2)}
.tl{font-size:7px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;flex-shrink:0}
.sep{width:1px;height:16px;background:var(--b2);flex-shrink:0;margin:0 2px}
.btn{background:var(--b1);border:1px solid var(--b2);color:var(--dim);padding:3px 9px;
  border-radius:3px;cursor:pointer;font-size:9px;white-space:nowrap;flex-shrink:0;font-family:monospace}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.on{background:rgba(0,202,255,.08);border-color:var(--acc);color:var(--acc)}
.btn.a{border-color:rgba(255,140,0,.3);color:var(--upd)}
.btn.a.on{background:rgba(255,140,0,.08);border-color:var(--upd)}
#sq{background:var(--b1);border:1px solid var(--b2);color:var(--txt);
  padding:3px 9px;border-radius:3px;font-size:9px;width:155px;outline:none;flex-shrink:0;font-family:monospace}
#sq:focus{border-color:var(--acc)}#sq::placeholder{color:var(--mut)}

/* ── Canvas area ── */
#wrap{position:fixed;top:92px;left:0;right:190px;bottom:0}
#cv{width:100%;height:100%;display:block;cursor:crosshair}

/* ── Table detail panel (slides in from right, above canvas, below sidebar) ── */
#panel{position:fixed;top:92px;right:190px;bottom:0;width:280px;
  background:rgba(7,9,14,.98);border-left:1px solid var(--b1);border-right:1px solid var(--b1);
  transform:translateX(100%);transition:transform .18s;z-index:350;display:flex;flex-direction:column}
#panel.open{transform:translateX(0)}
#ph{padding:10px;border-bottom:1px solid var(--b1);flex-shrink:0;position:relative}
#pt{font-size:13px;font-weight:700;color:var(--acc);word-break:break-all;margin-bottom:2px}
#pm{font-size:8px;color:var(--dim)}
#paf{display:none;margin-top:5px;padding:4px 8px;border-radius:3px;font-size:8.5px;font-weight:600}
#paf.d{display:block;background:rgba(255,61,96,.1);border:1px solid rgba(255,61,96,.25);color:var(--del)}
#paf.u{display:block;background:rgba(255,140,0,.08);border:1px solid rgba(255,140,0,.25);color:var(--upd)}
#pcl{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;padding:3px 6px;font-family:monospace}
#pcl:hover{color:var(--acc)}
#pb{flex:1;overflow-y:auto;font-size:9px}
#pb::-webkit-scrollbar{width:2px}#pb::-webkit-scrollbar-thumb{background:var(--b2)}
.ps{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.03)}
.pst{font-size:7px;color:var(--mut);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.ce{display:flex;gap:3px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.02);align-items:flex-start}
.ce.an{background:rgba(255,98,0,.05);border-radius:2px;padding:2px 4px;border-bottom:none;margin:1px 0}
.cf{font-size:6px;padding:1px 3px;border-radius:2px;flex-shrink:0;margin-top:1px;border:1px solid}
.pk{background:rgba(245,158,11,.1);color:#f59e0b;border-color:rgba(245,158,11,.2)}
.anc{background:rgba(255,98,0,.12);color:var(--col);border-color:rgba(255,98,0,.2)}
.dlc{background:rgba(255,61,96,.12);color:var(--del);border-color:rgba(255,61,96,.2)}
.cn{flex:1;line-height:1.4;word-break:break-all}
.cn.a{color:#ffa050;font-weight:500}
.ct{font-size:7px;color:var(--dim);margin-top:1px}
.re{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.02)}.re:last-child{border:none}
.ro{color:var(--acc);cursor:pointer}.ro:hover{text-decoration:underline}
.rd{font-size:7.5px;color:var(--dim);margin-top:1px}

/* ── Domain sidebar ── */
#dside{
  position:fixed;top:0;right:0;bottom:0;width:190px;
  z-index:500;
  background:#0a0e16;
  border-left:2px solid var(--b2);
  display:flex;flex-direction:column;
}
#dside-hdr{
  height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  border-bottom:1px solid var(--b2);
  background:#0a0e16;
  flex-shrink:0;
}
#dside-hdr-tb{
  height:44px;
  display:flex;align-items:center;justify-content:center;
  gap:5px;
  border-bottom:1px solid var(--b1);
  background:#0a0e16;
  flex-shrink:0;
  padding:0 10px;
}
#dside-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--acc);font-weight:700}
#dlist{flex:1;overflow-y:auto;padding:6px 0}
#dlist::-webkit-scrollbar{width:3px}#dlist::-webkit-scrollbar-thumb{background:var(--b2)}
.drow{
  display:flex;align-items:center;gap:9px;
  padding:7px 14px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .1s,border-color .1s;
}
.drow:hover{background:rgba(255,255,255,.04)}
.drow.active{border-left-color:currentColor;background:rgba(255,255,255,.03)}
.drow.off{opacity:.22}
.drow-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.drow-lbl{font-size:11px;font-weight:600;flex:1;letter-spacing:.2px}
.drow-cnt{font-size:9px;color:var(--dim);flex-shrink:0;background:var(--b1);padding:1px 5px;border-radius:10px}
#dside-leg{
  padding:10px 14px 14px;flex-shrink:0;
  border-top:1px solid var(--b1);
  background:#0a0e16;
}
.lsep{height:1px;background:var(--b1);margin:8px 0}
.ltitle{font-size:7px;color:var(--mut);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-weight:700}
.lrow{display:flex;align-items:center;gap:7px;padding:3px 0}
.lrow span.ic{font-size:10px;font-weight:700;width:10px;text-align:center;flex-shrink:0}
.lrow .ll{font-size:9px;color:var(--dim)}

/* ── Zoom controls ── */
#zb{position:fixed;bottom:12px;left:12px;z-index:450;
  background:rgba(7,9,14,.93);border:1px solid var(--b1);border-radius:4px;
  padding:4px 7px;display:flex;align-items:center;gap:5px;font-size:9px;color:var(--dim)}
.zbt{background:none;border:1px solid var(--b2);color:var(--dim);
  width:18px;height:18px;border-radius:3px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;line-height:1;font-family:monospace}
.zbt:hover{border-color:var(--acc);color:var(--acc)}
</style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <div id="logo">XSTORE POS</div>
  <div class="bge">v24.0.0</div>
  <div class="bge w">&#9888; GDPR</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <div style="display:flex;flex-direction:column;align-items:center"><span class="sn" style="color:var(--acc)" id="sv">691</span><span class="sl">Tables</span></div>
    <div class="sd"></div>
    <div style="display:flex;flex-direction:column;align-items:center"><span class="sn" style="color:var(--acc)">628</span><span class="sl">Relations</span></div>
    <div class="sd"></div>
    <div style="display:flex;flex-direction:column;align-items:center"><span class="sn" style="color:var(--del)">2</span><span class="sl">DELETE</span></div>
    <div class="sd"></div>
    <div style="display:flex;flex-direction:column;align-items:center"><span class="sn" style="color:var(--upd)">20</span><span class="sl">UPDATE</span></div>
    <div class="sd"></div>
    <div style="display:flex;flex-direction:column;align-items:center"><span class="sn" style="color:var(--col)">168</span><span class="sl">Wiped</span></div>
  </div>
</div>

<!-- Toolbar -->
<div id="tb">
  <span class="tl">View</span>
  <button class="btn" onclick="fitAll()">Fit All</button>
  <button class="btn" onclick="setS(1)">1:1</button>
  <div class="sep"></div>
  <span class="tl">Cols</span>
  <button class="btn" onclick="setExp(1)">Expand All</button>
  <button class="btn" onclick="setExp(0)">Collapse All</button>
  <div class="sep"></div>
  <span class="tl">Anon</span>
  <button class="btn a" id="baf" onclick="toggleAF()">Anon Focus</button>
  <button class="btn a" onclick="anonOnly()">Anon Only</button>
  <div class="sep"></div>
  <input id="sq" placeholder="Search tables&#8230;" oninput="doSearch(this.value)">
</div>

<!-- Canvas -->
<div id="wrap"><canvas id="cv"></canvas></div>

<!-- Table detail panel -->
<div id="panel">
  <div id="ph">
    <div id="pt"></div><div id="pm"></div><div id="paf"></div>
    <button id="pcl" onclick="closeP()">&#x2715;</button>
  </div>
  <div id="pb"></div>
</div>

<!-- Domain sidebar (always visible, right edge) -->
<div id="dside">
  <!-- top section aligns with main header -->
  <div id="dside-hdr">
    <span id="dside-title">Domains</span>
  </div>
  <!-- second row aligns with toolbar -->
  <div id="dside-hdr-tb">
    <button class="btn" style="flex:1" onclick="selAllCats(1)">All</button>
    <button class="btn" style="flex:1" onclick="selAllCats(0)">None</button>
  </div>
  <!-- domain list -->
  <div id="dlist"></div>
  <!-- legend -->
  <div id="dside-leg">
    <div class="lsep"></div>
    <div class="ltitle">Anonymisation</div>
    <div class="lrow"><span style="width:10px;height:10px;border-radius:2px;background:var(--del);display:inline-block;flex-shrink:0"></span><span class="ll">DELETE table</span></div>
    <div class="lrow"><span style="width:10px;height:10px;border-radius:2px;background:var(--upd);display:inline-block;flex-shrink:0"></span><span class="ll">UPDATE cols</span></div>
    <div class="lrow"><span class="ic" style="color:var(--col)">&#8709;</span><span class="ll">Anon column</span></div>
    <div class="lrow"><span class="ic" style="color:#f59e0b">&#9679;</span><span class="ll">Primary Key</span></div>
  </div>
</div>

<!-- Zoom controls -->
<div id="zb">
  <button class="zbt" onclick="doZ(-.15)">&#8722;</button>
  <span id="zp">12%</span>
  <button class="zbt" onclick="doZ(.15)">+</button>
</div>

    cx.fillText(`${(CATS[cat]||CATS.OTHER).label} · ${t.nc}`,sx+7*vs,sy+29*vs);
    if(act){cx.textAlign='right';cx.fillStyle=act==='D'?'#ff3d60':'#ff8c00';cx.font=`700 ${Math.max(6,7.5*vs)}px monospace`;cx.fillText(act==='D'?'DEL':'ANON',sx+sw-7*vs,sy+16*vs);}
    cx.textAlign='right';cx.fillStyle=C;cx.font=`${Math.max(8,11*vs)}px monospace`;cx.fillText(exp?'−':'+',sx+sw-7*vs,sy+29*vs);cx.textAlign='left';
  }
  cx.strokeStyle='rgba(26,37,53,.8)';cx.lineWidth=0.5;cx.beginPath();cx.moveTo(sx,sy+HDR*vs);cx.lineTo(sx+sw,sy+HDR*vs);cx.stroke();
  const ac=ACols[id]||new Set(),an=ANON[id];
  const cols=exp?t.cols:t.cols.slice(0,MXP),hasMore=!exp&&t.cols.length>MXP;
  cols.forEach((col,i)=>{
    const cy=sy+(HDR+i*CH)*vs,rh=CH*vs;
    if(cy+rh<sy||cy>sy+sh)return;
    const isPK=col.p===1,isAN=ac.has(col.n.toLowerCase())||act==='D';
    cx.fillStyle=isAN?'rgba(255,98,0,.08)':isPK?'rgba(245,158,11,.05)':(i%2?'transparent':'rgba(255,255,255,.01)');
    cx.fillRect(sx+1,cy,sw-2,rh);
    if(vs>0.3){
      cx.font=`${Math.max(6,8*vs)}px monospace`;
      if(isPK){cx.fillStyle='#f59e0b';cx.fillText('PK',sx+4*vs,cy+rh-2*vs);}
      else if(isAN){cx.fillStyle='#ff6200';cx.fillText('∅',sx+4*vs,cy+rh-2*vs);}
      const ox=(isPK||isAN)?18*vs:5*vs;
      cx.fillStyle=isAN?'#ffa050':'#b8cce0';
      let cn=col.n;const mw=sw-ox-40*vs;
      while(cx.measureText(cn).width>mw&&cn.length>3)cn=cn.slice(0,-2)+'…';
      cx.fillText(cn,sx+ox,cy+rh-2*vs);
      if(col.t&&vs>0.45){cx.fillStyle='#3d5870';cx.textAlign='right';cx.fillText(col.t,sx+sw-4*vs,cy+rh-2*vs);cx.textAlign='left';}
    }
  });
  if(hasMore){
    const my=sy+(HDR+MXP*CH)*vs;
    cx.fillStyle=C+'18';cx.fillRect(sx+1,my,sw-2,FT*vs);
    if(vs>0.3){cx.fillStyle=C;cx.font=`${Math.max(6,7*vs)}px monospace`;cx.fillText(`▸ ${t.cols.length-MXP} more`,sx+6*vs,my+FT*vs-2*vs);}
  }
  cx.globalAlpha=1;
}

function loop(){if(dirty)draw();requestAnimationFrame(loop);}

function wxy(ex,ey){const r=cv.getBoundingClientRect();return{x:(ex-r.left-vx)/vs,y:(ey-r.top-vy)/vs};}
function nodeAt(wx,wy){
  const act=active();
  for(let i=act.length-1;i>=0;i--){const id=act[i],p=pos[id],h=nodeH(id);if(wx>=p.x&&wx<=p.x+NW&&wy>=p.y&&wy<=p.y+h)return id;}
  return null;
}

let dId=null,dS=null,dP=null,dDrag=false;
cv.addEventListener('mousedown',e=>{
  const w=wxy(e.clientX,e.clientY),id=nodeAt(w.x,w.y);
  if(id){dId=id;dS={x:e.clientX,y:e.clientY};dP={...pos[id]};dDrag=false;}
  else{pan=true;pm={x:e.clientX,y:e.clientY};cv.style.cursor='grabbing';}
});
cv.addEventListener('mousemove',e=>{
  if(dId){const dx=(e.clientX-dS.x)/vs,dy=(e.clientY-dS.y)/vs;if(Math.abs(dx)>3||Math.abs(dy)>3)dDrag=true;pos[dId].x=dP.x+dx;pos[dId].y=dP.y+dy;dirty=true;return;}
  if(pan){vx+=e.clientX-pm.x;vy+=e.clientY-pm.y;pm={x:e.clientX,y:e.clientY};dirty=true;return;}
  const w=wxy(e.clientX,e.clientY),id=nodeAt(w.x,w.y);
  if(id!==hovN){hovN=id;dirty=true;cv.style.cursor=id?'pointer':'default';}
});
cv.addEventListener('mouseup',e=>{
  if(dId&&!dDrag){
    const w=wxy(e.clientX,e.clientY),p=pos[dId];
    if((w.x-p.x)/NW>0.72&&w.y-p.y<HDR){EXP.has(dId)?EXP.delete(dId):EXP.add(dId);}
    else selN(dId);
    dirty=true;
  }
  dId=null;pan=false;cv.style.cursor='default';
});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const d=e.deltaY<0?.12:-.12,ns=Math.max(0.03,Math.min(5,vs+d)),f=ns/vs;
  vx=mx-(mx-vx)*f;vy=my-(my-vy)*f;vs=ns;
  document.getElementById('zp').textContent=Math.round(vs*100)+'%';dirty=true;
},{passive:false});
cv.addEventListener('dblclick',e=>{const w=wxy(e.clientX,e.clientY),id=nodeAt(w.x,w.y);if(id){EXP.has(id)?EXP.delete(id):EXP.add(id);dirty=true;}});

function zoomTo(id){
  const p=pos[id];if(!p)return;
  const h=nodeH(id),W=cv.width/DPR,H=cv.height/DPR;
  const panelW=document.getElementById('panel').classList.contains('open')?280:0;
  const availW=W-panelW;
  const ns=Math.min((availW*0.35)/NW,2.5);
  vx=availW/2-(p.x+NW/2)*ns;
  vy=H/2-(p.y+h/2)*ns;
  vs=Math.max(0.3,ns);
  document.getElementById('zp').textContent=Math.round(vs*100)+'%';dirty=true;
}

function selN(id){
  if(sel===id){sel=null;hlSet=null;closeP();}
  else{
    sel=id;
    const s=new Set([id]);
    (RF[id]||[]).forEach(t=>s.add(t));(RT[id]||[]).forEach(t=>s.add(t));
    hlSet=s;openP(id);zoomTo(id);
  }
  dirty=true;
}
function doZ(d){const W=cv.width/DPR,H=cv.height/DPR,ns=Math.max(0.03,Math.min(5,vs+d)),f=ns/vs;vx=W/2-(W/2-vx)*f;vy=H/2-(H/2-vy)*f;vs=ns;document.getElementById('zp').textContent=Math.round(vs*100)+'%';dirty=true;}
function setS(s){vs=s;document.getElementById('zp').textContent=Math.round(vs*100)+'%';dirty=true;}
function fitAll(){
  const act=active();if(!act.length)return;
  let mx=Infinity,my=Infinity,maxX=-Infinity,maxY=-Infinity;
  act.forEach(id=>{const p=pos[id],h=nodeH(id);mx=Math.min(mx,p.x);my=Math.min(my,p.y);maxX=Math.max(maxX,p.x+NW);maxY=Math.max(maxY,p.y+h);});
  const W=cv.width/DPR,H=cv.height/DPR,pad=50;
  vs=Math.min((W-pad*2)/(maxX-mx),(H-pad*2)/(maxY-my),2);
  vx=pad+(W-pad*2-(maxX-mx)*vs)/2-mx*vs;
  vy=pad+(H-pad*2-(maxY-my)*vs)/2-my*vs;
  document.getElementById('zp').textContent=Math.round(vs*100)+'%';dirty=true;
}
function setExp(v){if(v)Object.keys(TBLS).forEach(id=>EXP.add(id));else EXP.clear();dirty=true;}
function doSearch(q){srch=q.toLowerCase();dirty=true;}
function toggleAF(){aF=!aF;document.getElementById('baf').classList.toggle('on',aF);dirty=true;}
function anonOnly(){sel=null;hlSet=new Set(Object.keys(ANON));dirty=true;}

function openP(id){
  const t=TBLS[id],cat=pos[id]?.cat||'OTHER',C=catC(cat),an=ANON[id];
  document.getElementById('pt').textContent=id;
  document.getElementById('pm').innerHTML=`<span style="color:${C}">${(CATS[cat]||CATS.OTHER).label}</span> · ${t.nc} cols`;
  const paf=document.getElementById('paf');paf.className='';
  if(an){paf.className=an.a==='D'?'d':'u';paf.textContent=an.a==='D'?'🗑 ENTIRE TABLE DELETED':`⚠ ${an.c.length} cols → NULL`;}
  const pb=document.getElementById('pb');pb.innerHTML='';
  function mk(){const d=document.createElement('div');d.className='ps';return d;}
  const cs=mk();cs.innerHTML=`<div class="pst">Columns (${t.nc})</div>`;
  const ac=ACols[id]||new Set();
  t.cols.forEach(c=>{
    const isAN=ac.has(c.n.toLowerCase())||an?.a==='D';
    const el=document.createElement('div');el.className='ce'+(isAN?' an':'');
    const pkf=c.p?`<span class="cf pk">PK</span>`:'';
    const af=isAN?(an?.a==='D'?`<span class="cf dlc">DEL</span>`:`<span class="cf anc">∅</span>`):'';
    el.innerHTML=`<div style="display:flex;gap:2px;flex-shrink:0">${pkf}${af}</div><div style="flex:1"><div class="cn${isAN?' a':''}">${c.n}</div><div class="ct">${c.t}</div></div>`;
    cs.appendChild(el);
  });pb.appendChild(cs);
  const inR=RT[id]||[],outR=RF[id]||[];
  if(inR.length||outR.length){
    const rs=mk();rs.innerHTML=`<div class="pst">Relationships (${inR.length+outR.length})</div>`;
    outR.forEach(to=>{const e=document.createElement('div');e.className='re';e.innerHTML=`<div class="ro" onclick="selN('${to}')" ${isA(to)?'style="color:var(--upd)"':''}>&rarr; ${to}</div><div class="rd">references</div>`;rs.appendChild(e);});
    inR.forEach(fr=>{const e=document.createElement('div');e.className='re';e.innerHTML=`<div class="ro" onclick="selN('${fr}')" ${isA(fr)?'style="color:var(--upd)"':''}>&larr; ${fr}</div><div class="rd">referenced by</div>`;rs.appendChild(e);});
    pb.appendChild(rs);
  }
  if(an?.c.length){
    const as=mk();as.innerHTML=`<div class="pst" style="color:var(--col)">Anonymised Fields (${an.c.length})</div>`;
    an.c.forEach(c=>{const e=document.createElement('div');e.style.cssText='font-size:8.5px;color:#ffa050;padding:2px 0;border-bottom:1px solid rgba(255,98,0,.07)';e.textContent='∅  '+c;as.appendChild(e);});
    pb.appendChild(as);
  }
  document.getElementById('panel').classList.add('open');
}
function closeP(){document.getElementById('panel').classList.remove('open');sel=null;hlSet=null;dirty=true;}

function catCount(k){return Object.keys(TBLS).filter(id=>(pos[id]?.cat||'OTHER')===k).length;}
function selAllCats(v){
  Object.keys(CATS).forEach(k=>{
    if(v)catF.add(k);else catF.delete(k);
    if(chipEls[k])chipEls[k].classList.toggle('off',!v);
  });
  dirty=true;
}
function buildUI(){
  const dl=document.getElementById('dlist');
  Object.entries(CATS).forEach(([k,c])=>{
    const row=document.createElement('div');
    row.className='drow';
    row.style.color=c.color;
    const cnt=catCount(k);
    row.innerHTML=`<span class="drow-dot" style="background:${c.color}"></span><span class="drow-lbl">${c.label}</span><span class="drow-cnt">${cnt}</span>`;
    row.onclick=()=>{
      catF.has(k)?catF.delete(k):catF.add(k);
      row.classList.toggle('off',!catF.has(k));
      dirty=true;
    };
    dl.appendChild(row);
    chipEls[k]=row;
  });
}

resize();
window.addEventListener('resize',()=>{resize();fitAll();});
buildUI();
fitAll();
loop();
</script>
</body>
</html>
